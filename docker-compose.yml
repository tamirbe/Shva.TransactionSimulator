services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: shva-sql
    environment:
      SA_PASSWORD: "YourStrong!Pass123"
      ACCEPT_EULA: "Y"
    ports:
      - "1433:1433"

  backend:
    build:
      context: ./Shva.TransactionSimulatorApi
    container_name: shva-api
    ports:
      - "8080:8080"
    depends_on:
      - sqlserver

  frontend:
    build:
      context: ./shva-transaction-simulator-client
    container_name: shva-client
    ports:
      - "5173:5173"
    depends_on:
      - backend
